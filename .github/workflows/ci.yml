name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-acceptance:
    name: Offline acceptance (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    env:
      PYTHONPATH: src
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run offline acceptance
        run: python scripts/run_offline_acceptance.py

  distribution:
    name: Build and inspect distribution
    needs: offline-acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Audit distribution contents
        run: python scripts/check_public_release.py dist/*.whl dist/*.tar.gz

      - name: Smoke-test the installed wheel from an unrelated directory
        run: >-
          python scripts/run_portable_wheel_smoke.py
          --wheel dist/*.whl
          --out /tmp/datalens-wheel-smoke.json
          --cwd /tmp

      - name: Generate checksums
        run: sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: datalens-dev-mcp-dist
          path: dist/*
          if-no-files-found: error
