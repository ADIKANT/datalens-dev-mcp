name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m pip install build twine

      - name: Run offline acceptance
        run: python scripts/run_offline_acceptance.py

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} does not match package version {expected!r}")
          PY

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Audit distribution contents
        run: python scripts/check_public_release.py dist/*.whl dist/*.tar.gz

      - name: Smoke-test the installed wheel from an unrelated directory
        run: >-
          python scripts/run_portable_wheel_smoke.py
          --wheel dist/*.whl
          --out /tmp/datalens-wheel-smoke.json
          --cwd /tmp

      - name: Generate checksums
        run: sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: datalens-dev-mcp-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Attest release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --verify-tag
          --generate-notes
          --title "datalens-dev-mcp ${GITHUB_REF_NAME}"
