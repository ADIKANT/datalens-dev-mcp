name: Feature request
description: Propose a focused addition or behavior change.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or capability gap should be addressed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe inputs, outputs, safety gates, and expected MCP client behavior.
    validations:
      required: true

  - type: dropdown
    id: write-impact
    attributes:
      label: DataLens write impact
      options:
        - Read-only or local-only
        - Uses an existing guarded write route
        - Proposes a new write route
        - Unsure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checks
    attributes:
      label: Scope checks
      options:
        - label: I searched existing issues and documentation.
          required: true
        - label: My example contains no private IDs, credentials, customer data, or copied source material.
          required: true
